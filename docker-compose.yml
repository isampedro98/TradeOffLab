services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-tradeofflab-dev-key}
    ports:
      - "${LITELLM_PROXY_PORT:-4000}:4000"
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
      LITELLM_MODEL: ${LITELLM_MODEL}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-tradeofflab-dev-key}
    depends_on:
      db:
        condition: service_healthy
      litellm:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
      - ./packages:/workspace/packages
    command: sh /app/start.sh

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: sh -lc "rm -rf /app/.next/* && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
